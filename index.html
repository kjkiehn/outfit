<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="What to Wear" />
  <meta name="theme-color" content="#0f0f0f" />
  <!-- v6 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>What to Wear</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #0f0f0f; color: #f0ece4; font-family: 'Georgia', 'Times New Roman', serif; }
    body { display: flex; flex-direction: column; align-items: center; padding: env(safe-area-inset-top, 44px) 20px 60px; min-height: 100vh; padding-top: max(44px, env(safe-area-inset-top)); }

    .header { text-align: center; margin-bottom: 36px; margin-top: 20px; }
    .sub { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: #555; margin-bottom: 10px; }
    h1 { font-size: clamp(30px, 7vw, 44px); font-weight: normal; letter-spacing: -0.02em; }

    .card { width: 100%; max-width: 380px; background: #1a1a1a; border: 1px solid #242424; border-radius: 16px; padding: 28px; margin-bottom: 12px; }
    .section-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #555; margin-bottom: 20px; display: block; }
    .field-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #555; display: block; margin-bottom: 8px; }

    .temp-row { display: flex; gap: 12px; margin-bottom: 20px; }
    .temp-group { flex: 1; }
    input[type=number] { width: 100%; padding: 12px 14px; background: #111; border: 1px solid #2a2a2a; border-radius: 10px; color: #f0ece4; font-size: 16px; font-family: 'Georgia', serif; -webkit-appearance: none; }
    input[type=number]:focus { outline: none; border-color: #555; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; margin-bottom: 28px; }
    .chip { padding: 8px 13px; border-radius: 20px; font-size: 12px; cursor: pointer; font-family: 'Georgia', serif; border: 1px solid #2a2a2a; background: none; color: #666; transition: all 0.15s; }
    .chip.active { background: #f0ece4; color: #0f0f0f; border-color: transparent; }

    .main-btn { width: 100%; padding: 18px; background: #f0ece4; color: #0f0f0f; border: none; border-radius: 12px; font-size: 15px; letter-spacing: 0.03em; font-family: 'Georgia', serif; cursor: pointer; transition: opacity 0.2s; }
    .main-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .main-btn:active { opacity: 0.8; }

    .weather-strip { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; font-size: 13px; color: #777; padding: 14px 20px; }
    .weather-strip strong { color: #f0ece4; font-size: 20px; }
    .weather-icon { font-size: 20px; }

    .vibe { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #555; margin-bottom: 22px; }
    .outfit-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1f1f1f; }
    .row-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #555; min-width: 56px; }
    .row-val { font-size: 15px; color: #f0ece4; text-align: right; flex: 1; padding-left: 16px; }
    .why { margin-top: 18px; font-size: 13px; color: #666; line-height: 1.65; font-style: italic; }

    .btn-row { display: flex; gap: 10px; margin-top: 24px; }
    .log-btn { flex: 1; padding: 13px; background: #f0ece4; color: #0f0f0f; border: none; border-radius: 10px; font-size: 13px; cursor: pointer; font-family: 'Georgia', serif; transition: all 0.2s; }
    .log-btn.logged { background: #1a2a1a; color: #4a8a4a; border: 1px solid #2a4a2a; cursor: default; }
    .ghost-btn { flex: 1; padding: 13px; background: none; color: #777; border: 1px solid #2a2a2a; border-radius: 10px; font-size: 13px; cursor: pointer; font-family: 'Georgia', serif; }
    .back-btn { width: 100%; margin-top: 10px; padding: 8px; background: none; color: #3a3a3a; border: none; font-size: 12px; cursor: pointer; font-family: 'Georgia', serif; }

    .worn-section { width: 100%; max-width: 380px; margin-top: 20px; }
    .worn-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #333; margin-bottom: 10px; display: block; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { font-size: 11px; color: #444; background: #161616; border: 1px solid #1f1f1f; border-radius: 20px; padding: 4px 10px; }
    .clear-btn { margin-top: 12px; background: none; border: none; color: #333; font-size: 11px; cursor: pointer; letter-spacing: 0.1em; font-family: 'Georgia', serif; }

    .select-group { margin-bottom: 16px; }
    select { width: 100%; padding: 12px 14px; background: #111; border: 1px solid #2a2a2a; border-radius: 10px; color: #f0ece4; font-size: 14px; font-family: 'Georgia', serif; -webkit-appearance: none; appearance: none; cursor: pointer; }
    select:focus { outline: none; border-color: #555; }
    .select-wrap { position: relative; }
    .select-wrap::after { content: "↓"; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #555; font-size: 12px; pointer-events: none; }
    .link-btn { width: 100%; margin-top: 12px; padding: 10px; background: none; color: #555; border: none; font-size: 12px; cursor: pointer; font-family: 'Georgia', serif; letter-spacing: 0.05em; }
    .link-btn:hover { color: #888; }
    .screen.active { display: block; width: 100%; max-width: 380px; }
    #screen-result { display: none; }
    #screen-result.active { display: block; width: 100%; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease; }
    button:active { opacity: 0.75; }
  </style>
</head>
<body>

<div class="header">
  <div class="sub">Bentonville, AR</div>
  <h1>What to Wear</h1>
  <div style="font-size:9px;color:#333;margin-top:6px;letter-spacing:0.1em">v19</div>
</div>

<!-- INPUT SCREEN -->
<div id="screen-input" class="screen active">
  <div class="card">
    <span class="section-label">Today's Weather</span>
    <div class="temp-row">
      <div class="temp-group">
        <span class="field-label">Current °F</span>
        <input type="number" id="inp-temp" placeholder="65" />
      </div>
      <div class="temp-group">
        <span class="field-label">High °F</span>
        <input type="number" id="inp-high" placeholder="80" />
      </div>
    </div>
    <span class="field-label">Condition</span>
    <div class="chips" id="chips"></div>
    <button class="main-btn" id="go-btn" onclick="generateOutfit()">Get My Outfit</button>
    <button class="link-btn" onclick="showAnchor()">🎯 Start with a specific item</button>
    <button class="link-btn" onclick="showManualLog()">+ Log what I actually wore</button>
    <div id="worn-status" style="margin-top:12px;text-align:center;font-size:11px;color:#444;letter-spacing:0.05em"></div>
  </div>
</div>

<!-- ANCHOR SCREEN -->
<div id="screen-anchor" class="screen">
  <div class="card">
    <span class="section-label">Start With One Item</span>
    <div class="select-group">
      <span class="field-label">I want to wear...</span>
      <div class="select-wrap">
        <select id="anchor-category" onchange="updateAnchorItems()">
          <option value="">— choose category —</option>
          <option value="top">A top / long sleeve</option>
          <option value="ss">A short sleeve</option>
          <option value="tee">A tee</option>
          <option value="layer">A layer / jacket</option>
          <option value="bottom">Bottoms</option>
        </select>
      </div>
    </div>
    <div class="select-group" id="anchor-item-group" style="display:none">
      <span class="field-label">Specifically...</span>
      <div class="select-wrap">
        <select id="anchor-item">
          <option value="">— select item —</option>
        </select>
      </div>
    </div>
    <button class="main-btn" id="anchor-go-btn" onclick="generateWithAnchor()" style="opacity:0.4;cursor:not-allowed" disabled>Build Outfit Around This</button>
    <button class="back-btn" onclick="showInput()">← Back</button>
  </div>
</div>

<!-- MANUAL LOG SCREEN -->
<div id="screen-log" class="screen">
  <div class="card">
    <span class="section-label">Log Today's Outfit</span>
    <div class="select-group">
      <span class="field-label">Top</span>
      <div class="select-wrap">
        <select id="log-top">
          <option value="">— select —</option>
        </select>
      </div>
    </div>
    <div class="select-group">
      <span class="field-label">Layer (optional)</span>
      <div class="select-wrap">
        <select id="log-layer">
          <option value="">— none —</option>
        </select>
      </div>
    </div>
    <div class="select-group">
      <span class="field-label">Bottom</span>
      <div class="select-wrap">
        <select id="log-bottom">
          <option value="">— select —</option>
        </select>
      </div>
    </div>
    <div class="select-group">
      <span class="field-label">Shoes</span>
      <div class="select-wrap">
        <select id="log-shoes">
          <option value="">— select —</option>
          <option>white sneakers</option>
          <option>Blundstones</option>
        </select>
      </div>
    </div>
    <button class="main-btn" onclick="saveManualLog()" style="margin-top:8px">Save to History</button>
    <button class="back-btn" onclick="showInput()">← Back</button>
  </div>

<!-- RESULT SCREEN -->
<div id="screen-result">
  <div class="card weather-strip" id="weather-strip"></div>
  <div class="card fade-in">
    <div class="vibe" id="result-vibe"></div>
    <div id="result-rows"></div>
    <div class="why" id="result-why"></div>
    <div class="btn-row">
      <button class="log-btn" id="log-btn" onclick="logWorn()">I'll wear this</button>
      <button class="ghost-btn" onclick="tryAnother()">Try another</button>
    </div>
    <button class="back-btn" onclick="showInput()">← Change weather</button>
  </div>
</div>

<!-- WORN -->
<div class="worn-section" id="worn-section" style="display:none">
  <span class="worn-label">Recently Worn</span>
  <div class="tags" id="worn-tags"></div>
  <button class="clear-btn" onclick="clearWorn()">Clear history</button>
</div>

<script>
// ── Wardrobe ──────────────────────────────────────────────────────────────────
const W = {
  tees: ["white tee","black tee","tan tee","olive green tee","gray tee"],
  ls: ["white fitted Henley","black relaxed Henley","gold Henley","baby blue LS button-up","dark blue LS button-up","blue/white stripe LS button-up","dark LS flannel","gray crewneck sweatshirt","black pullover hoodie"],
  ss: ["white SS button-up","white/blue stripe SS button-up","white/orange stripe SS button-up","multicolor stripe SS button-up","denim SS button-up","mint SS button-up","olive SS button-up","gray polo","black SS button-up"],
  layers: ["olive shirt jacket","denim shirt jacket","tan Gap shirt jacket","multicolor flannel overshirt","dark North Face zip-up","black windbreaker","brown blazer","black Lava hoodie"],
  chinos: ["navy chinos","tan chinos"],
  jeans: ["black slim jeans","medium wash slim jeans","black carpenter jeans"],
  pants: ["olive slim pants"],
  shorts: ["olive shorts","khaki shorts"],
};

const CONDITIONS = ["Sunny","Partly cloudy","Cloudy","Windy","Chance of rain","Rainy","Thunderstorms"];
let selectedCond = "Sunny";
let worn = JSON.parse(localStorage.getItem("worn") || "[]");
let lastOutfit = null;
let extraAvoid = [];
let anchorItem = null;
let anchorCat = null;

// ── Build chips ───────────────────────────────────────────────────────────────
function icon(c) {
  const l = c.toLowerCase();
  if (l.includes("thunder")) return "⛈️";
  if (l.includes("rain")) return "🌧️";
  if (l.includes("wind")) return "💨";
  if (l.includes("partly")) return "⛅";
  if (l.includes("cloud")) return "☁️";
  return "☀️";
}

const chipsEl = document.getElementById("chips");
CONDITIONS.forEach(c => {
  const b = document.createElement("button");
  b.className = "chip" + (c === selectedCond ? " active" : "");
  b.textContent = icon(c) + " " + c;
  b.onclick = () => {
    selectedCond = c;
    document.querySelectorAll(".chip").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
  };
  chipsEl.appendChild(b);
});

// ── Color tags ────────────────────────────────────────────────────────────────
// Each item tagged with a color family. "neutral" goes with everything.
// "earth" = tan/brown/olive/khaki. "cool" = blue/navy/gray. "warm" = gold/orange.
const COLOR = {
  // Tees
  "white tee": "neutral",
  "black tee": "neutral",
  "tan tee": "earth",
  "olive green tee": "earth",
  "gray tee": "neutral",
  // Long sleeve
  "white fitted Henley": "neutral",
  "black relaxed Henley": "neutral",
  "gold Henley": "warm",
  "baby blue LS button-up": "cool",
  "dark blue LS button-up": "cool",
  "blue/white stripe LS button-up": "cool",
  "dark LS flannel": "neutral",
  "gray crewneck sweatshirt": "neutral",
  "black pullover hoodie": "neutral",
  "black Lava hoodie": "neutral",
  // Short sleeve
  "white SS button-up": "neutral",
  "white/blue stripe SS button-up": "cool",
  "white/orange stripe SS button-up": "warm",
  "multicolor stripe SS button-up": "multi",
  "denim SS button-up": "cool",
  "mint SS button-up": "cool",
  "olive SS button-up": "earth",
  "gray polo": "neutral",
  "black SS button-up": "neutral",
  // Layers
  "olive shirt jacket": "earth",
  "denim shirt jacket": "cool",
  "tan Gap shirt jacket": "earth",
  "multicolor flannel overshirt": "multi",
  "dark North Face zip-up": "cool",
  "black windbreaker": "neutral",
  "brown blazer": "earth",
  // Bottoms
  "navy chinos": "cool",
  "tan chinos": "earth",
  "black slim jeans": "neutral",
  "medium wash slim jeans": "cool",
  "black carpenter jeans": "neutral",
  "olive slim pants": "earth",
  "olive shorts": "earth",
  "khaki shorts": "earth",
};

// Pattern tags — solid items can pair with anything, patterned items should not pair with each other
const PATTERN = {
  // Solids (can pair with anything)
  "white tee": "solid", "black tee": "solid", "tan tee": "solid", "olive green tee": "solid", "gray tee": "solid",
  "white fitted Henley": "solid", "black relaxed Henley": "solid", "gold Henley": "solid",
  "baby blue LS button-up": "solid", "dark blue LS button-up": "solid",
  "gray crewneck sweatshirt": "solid", "black pullover hoodie": "solid", "black Lava hoodie": "solid",
  "white SS button-up": "solid", "denim SS button-up": "solid", "mint SS button-up": "solid",
  "olive SS button-up": "solid", "gray polo": "solid", "black SS button-up": "solid",
  "olive shirt jacket": "solid", "denim shirt jacket": "solid", "tan Gap shirt jacket": "solid",
  "dark North Face zip-up": "solid", "black windbreaker": "solid", "brown blazer": "solid",
  "navy chinos": "solid", "tan chinos": "solid", "black slim jeans": "solid",
  "medium wash slim jeans": "solid", "black carpenter jeans": "solid",
  "olive slim pants": "solid", "olive shorts": "solid", "khaki shorts": "solid",
  // Patterns (never pair two patterns together)
  "blue/white stripe LS button-up": "stripe",
  "dark LS flannel": "plaid",
  "white/blue stripe SS button-up": "stripe",
  "white/orange stripe SS button-up": "stripe",
  "multicolor stripe SS button-up": "stripe",
  "multicolor flannel overshirt": "plaid",
};

function isPattern(item) {
  const p = PATTERN[item] || "solid";
  return p !== "solid";
}

function patternsClash(top, layer) {
  const pt = PATTERN[top] || "solid";
  const pl = PATTERN[layer] || "solid";
  // Two stripes together = clash
  if (pt === "stripe" && pl === "stripe") return true;
  // Two plaids together = clash
  if (pt === "plaid" && pl === "plaid") return true;
  // Stripe top under plaid layer = clash (busy on busy)
  if (pt === "stripe" && pl === "plaid") return true;
  // Plaid top under stripe layer = clash
  if (pt === "plaid" && pl === "stripe") return true;
  // Solid top under any pattern = fine
  // Any top under solid layer = fine
  return false;
}

// Specific item-level clash pairs — solid black + solid navy looks like a mistake
const ITEM_CLASHES = [
  // Black solid top + navy solid bottom
  ["black tee", "navy chinos"],
  ["black relaxed Henley", "navy chinos"],
  ["black SS button-up", "navy chinos"],
  ["black pullover hoodie", "navy chinos"],
  ["black slim jeans", "navy chinos"],
  ["black carpenter jeans", "navy chinos"],
  // Denim on denim
  ["denim SS button-up", "medium wash slim jeans"],
  ["denim shirt jacket", "medium wash slim jeans"],
  // NOTE: black bottoms + multicolor/patterned layers (e.g. multicolor flannel) are fine
  // because the pattern reads as its own thing, not a direct black+navy pairing
];

// Check if two specific items clash
function itemsClash(a, b) {
  return ITEM_CLASHES.some(([x, y]) => (a === x && b === y) || (a === y && b === x));
}

function colorOf(item) {
  return COLOR[item] || "neutral";
}

function colorsClash(a, b) {
  if (itemsClash(a, b)) return true;
  if (patternsClash(a, b)) return true;
  const ca = colorOf(a), cb = colorOf(b);
  if (ca === "neutral" || cb === "neutral" || ca === "multi" || cb === "multi") return false;
  if (ca === cb) return false;
  if ((ca === "warm" && cb === "earth") || (ca === "earth" && cb === "warm")) return true;
  return false;
}

function threeWayClash(top, layer, bottom) {
  if (itemsClash(top, bottom) || itemsClash(top, layer) || itemsClash(layer, bottom)) return true;
  const ct = colorOf(top), cl = layer ? colorOf(layer) : "neutral", cb = colorOf(bottom);
  if (ct === "earth" && cb === "earth" && cl === "earth") return true;
  if (ct === "cool" && cb === "cool" && cl === "cool") return false;
  if (ct === "warm" && cb === "earth") return true;
  if (ct === "earth" && cb === "warm") return true;
  return false;
}


// ── Style compatibility ───────────────────────────────────────────────────────
// Layers that work as casual overshirts (over a tee)
const CASUAL_LAYERS = ["olive shirt jacket","denim shirt jacket","tan Gap shirt jacket","multicolor flannel overshirt"];
// Layers that are outerwear/weather layers (over anything)
const WEATHER_LAYERS = ["dark North Face zip-up","black windbreaker","black Lava hoodie"];
// Blazer only pairs with chinos, never shorts or hoodies
const SMART_LAYERS = ["brown blazer"];

// Tops that should NOT go under a blazer
const NO_BLAZER_TOPS = ["black pullover hoodie","gray crewneck sweatshirt","dark LS flannel"];
// Tops that should NOT go under casual shirt jackets (too bulky)
const NO_SHIRT_JACKET_TOPS = ["gray crewneck sweatshirt","black pullover hoodie"];

function pick(arr, avoid) {
  let candidates = arr.filter(x => !avoid.has(x));
  if (candidates.length === 0) candidates = [...arr];
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function pickColorFiltered(arr, avoid, colorAnchor) {
  let candidates = arr.filter(x => !avoid.has(x));
  if (candidates.length === 0) candidates = [...arr];
  if (colorAnchor && candidates.length > 1) {
    const good = candidates.filter(x => !colorsClash(x, colorAnchor));
    if (good.length > 0) candidates = good;
  }
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function pickLayer(allowedTypes, top, bottom, avoidSet) {
  let pool = [];
  if (allowedTypes.includes("casual")) pool = [...pool, ...CASUAL_LAYERS];
  if (allowedTypes.includes("weather")) pool = [...pool, ...WEATHER_LAYERS];
  if (allowedTypes.includes("smart")) {
    const noBlazerTop = NO_BLAZER_TOPS.includes(top);
    const shortsBottom = bottom && bottom.includes("shorts");
    if (!noBlazerTop && !shortsBottom) pool = [...pool, ...SMART_LAYERS];
  }
  // Remove shirt jackets if top is too bulky
  if (NO_SHIRT_JACKET_TOPS.includes(top)) {
    pool = pool.filter(l => !CASUAL_LAYERS.includes(l));
    pool = [...pool, ...WEATHER_LAYERS];
  }
  // Filter by color AND pattern compatibility with top and bottom
  let candidates = pool.filter(l => !avoidSet.has(l));
  if (candidates.length === 0) candidates = pool;
  const colorFiltered = candidates.filter(l =>
    !colorsClash(l, top) &&
    !colorsClash(l, bottom) &&
    !threeWayClash(top, l, bottom) &&
    !patternsClash(l, top) // never layer a pattern over a pattern
  );
  if (colorFiltered.length > 0) candidates = colorFiltered;
  if (candidates.length === 0) return null;
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function buildOutfit(temp, high, cond, avoidSet) {
  const isRainy = ["Rainy","Thunderstorms","Chance of rain"].includes(cond);
  const isWindy = cond === "Windy";
  const shoes = isRainy ? "Blundstones" : "white sneakers";
  const swing = high - temp; // temperature swing during the day

  // Swing thresholds:
  // big swing (15°+): need an easily removable layer, NOT a pullover/hoodie
  // medium swing (8-14°): a layer is helpful but can be any type
  // small swing (<8°): dress for current temp, layer optional
  const bigSwing = swing >= 15;
  const medSwing = swing >= 8 && swing < 15;

  // Items that can't be easily removed (pullovers = stuck with them)
  const STUCK_TOPS = ["gray crewneck sweatshirt","black pullover hoodie"];

  let bottom, top, layer = null, vibe, why;

  // ── Bottoms ──
  if (high >= 78 && !isRainy) {
    bottom = pick([...W.shorts, ...W.chinos, ...W.pants], avoidSet);
  } else if (temp < 65) {
    bottom = pick([...W.jeans, ...W.chinos, ...W.pants], avoidSet);
  } else {
    bottom = pick([...W.chinos, ...W.jeans, ...W.pants], avoidSet);
  }

  const hasShorts = bottom && bottom.includes("shorts");

  // ── Tops + layers ──
  if (temp < 55) {
    if (bigSwing) {
      // Cold now, warming up a lot — light base + removable layer
      const lightLS = W.ls.filter(t => !["gray crewneck sweatshirt","black pullover hoodie","dark LS flannel"].includes(t));
      top = pick([...W.tees, ...lightLS], avoidSet);
      layer = pickLayer(["casual","weather"], top, bottom, avoidSet);
      vibe = "Cold now, warming later";
      why = `${temp}°F now but hitting ${high}°F — a light base with an open layer you can remove is the move.`;
    } else {
      // Cold with small/no swing — long sleeve is fine
      top = pick(W.ls.filter(t => !STUCK_TOPS.includes(t)), avoidSet)
         || pick(W.ls, avoidSet);
      layer = pickLayer(["casual","weather"], top, bottom, avoidSet);
      vibe = "Bundle up";
      why = `At ${temp}°F with a high of only ${high}°F, staying warm all day is the priority.`;
    }

  } else if (temp < 65 && bigSwing) {
    // Cool now, warming up a lot — light base + removable open layer
    // Include LS button-ups and Henleys (not pullovers) as base options
    const lightLS = W.ls.filter(t => !["gray crewneck sweatshirt","black pullover hoodie","dark LS flannel"].includes(t));
    top = pick([...W.tees, ...W.ss, ...lightLS], avoidSet);
    layer = pickLayer(["casual","weather"], top, bottom, avoidSet);
    vibe = "Cool now, warm later";
    why = `${temp}°F now climbing to ${high}°F — a light top with an open layer you can ditch by afternoon is the move.`;

  } else if (temp < 65 && isWindy) {
    top = pick([...W.tees, ...W.ls], avoidSet);
    layer = pickLayer(["casual","weather"], top, bottom, avoidSet);
    vibe = "Cool & breezy";
    why = `${temp}°F with wind feels colder — an open layer lets you adjust throughout the day.`;

  } else if (temp < 65) {
    top = pick(W.ls, avoidSet);
    if (high < 72) {
      layer = pickLayer(["casual"], top, bottom, avoidSet);
    }
    vibe = "Cool morning";
    why = `${temp}°F now climbing to ${high}°F — a long sleeve handles both ends of the day.`;

  } else if (temp < 75 && (isWindy || cond === "Cloudy" || cond === "Partly cloudy" || cond === "Chance of rain")) {
    top = pick([...W.tees, ...W.ss, ...W.ls], avoidSet);
    if (!hasShorts) {
      layer = pickLayer(["casual","weather"], top, bottom, avoidSet);
    }
    vibe = "Warm with a breeze";
    why = `${temp}°F with ${cond.toLowerCase()} — a light open layer over a tee is the right call.`;

  } else if (temp < 75) {
    top = pick([...W.tees, ...W.ss, ...W.ls], avoidSet);
    vibe = "Nice out";
    why = `${temp}°F heading to ${high}°F — keep it casual.`;

  } else {
    // Hot — if rainy include LS options too
    top = isRainy
      ? pick([...W.tees, ...W.ss, ...W.ls], avoidSet)
      : pick([...W.tees, ...W.ss], avoidSet);
    vibe = `Warm day`;
    why = `At ${temp}°F heading to ${high}°F, keep it light and breathable.`;
  }

  if (isRainy) {
    vibe = "Rainy day";
    why += " Blundstones for the wet.";
    // Swap casual layer for weather layer if raining
    if (layer && CASUAL_LAYERS.includes(layer)) {
      layer = pickLayer(["weather"], top, bottom, avoidSet) || layer;
    }
  }

  return { top, layer, bottom, shoes, vibe, why };
}

// ── Generate ──────────────────────────────────────────────────────────────────
function generateOutfit(avoid = []) {
  const temp = Number(document.getElementById("inp-temp").value);
  const high = Number(document.getElementById("inp-high").value);
  if (!temp || !high) return;

  const avoidSet = new Set([...worn, ...avoid]);
  anchorItem = null;
  anchorCat = null;
  lastOutfit = buildOutfit(temp, high, selectedCond, avoidSet);
  extraAvoid = avoid;
  showResult(temp, high);
}

function showResult(temp, high) {
  const o = lastOutfit;

  // Weather strip
  document.getElementById("weather-strip").innerHTML =
    `<span class="weather-icon">${icon(selectedCond)}</span>
     <span><strong>${temp}°</strong> now</span>
     <span>↑ ${high}°</span>
     <span>${selectedCond}</span>`;

  document.getElementById("result-vibe").textContent = o.vibe;

  // Outfit rows
  const rows = [["Top", o.top], ["Layer", o.layer], ["Bottom", o.bottom], ["Shoes", o.shoes]].filter(([,v]) => v);
  document.getElementById("result-rows").innerHTML = rows.map(([l,v]) =>
    `<div class="outfit-row"><span class="row-label">${l}</span><span class="row-val">${v}</span></div>`
  ).join("");

  document.getElementById("result-why").textContent = o.why;

  const logBtn = document.getElementById("log-btn");
  logBtn.textContent = "I'll wear this";
  logBtn.className = "log-btn";

  document.getElementById("screen-input").classList.remove("active");
  document.getElementById("screen-result").style.display = "block";
  document.getElementById("screen-result").classList.add("active");
  renderWorn();
  window.scrollTo(0, 0);
}

function tryAnother() {
  const temp = Number(document.getElementById("inp-temp").value);
  const high = Number(document.getElementById("inp-high").value);
  // Add last suggestion's non-anchor items to avoid list so we get something different
  const newAvoid = [...extraAvoid, lastOutfit.top, lastOutfit.bottom, lastOutfit.layer].filter(Boolean);
  extraAvoid = newAvoid;

  if (anchorItem && anchorCat) {
    // Re-run anchor logic, keeping the anchor locked in and avoiding previous picks
    const avoidSet = new Set([...worn, ...newAvoid.filter(i => i !== anchorItem)]);
    buildAnchorOutfit(temp, high, anchorItem, anchorCat, avoidSet);
  } else {
    const avoidSet = new Set([...worn, ...newAvoid]);
    lastOutfit = buildOutfit(temp, high, selectedCond, avoidSet);
  }
  showResult(temp, high);
}

function logWorn() {
  if (!lastOutfit) return;
  const items = [lastOutfit.top, lastOutfit.layer, lastOutfit.bottom, lastOutfit.shoes].filter(Boolean);
  worn = [...new Set([...items, ...worn])].slice(0, 15);
  localStorage.setItem("worn", JSON.stringify(worn));
  const btn = document.getElementById("log-btn");
  btn.textContent = "✓ Logged";
  btn.className = "log-btn logged";
  renderWorn();
}

function showAnchor() {
  document.getElementById("screen-input").classList.remove("active");
  document.getElementById("screen-anchor").classList.add("active");
  window.scrollTo(0, 0);
}

function updateAnchorItems() {
  const cat = document.getElementById("anchor-category").value;
  const itemSel = document.getElementById("anchor-item");
  const group = document.getElementById("anchor-item-group");
  const goBtn = document.getElementById("anchor-go-btn");

  const map = {
    top: W.ls,
    ss: W.ss,
    tee: W.tees,
    layer: W.layers,
    bottom: [...W.chinos, ...W.jeans, ...W.shorts, ...W.pants],
  };

  if (!cat) { group.style.display = "none"; return; }
  group.style.display = "block";
  itemSel.innerHTML = '<option value="">— select item —</option>' +
    (map[cat] || []).map(i => `<option>${i}</option>`).join("");
  goBtn.disabled = true;
  goBtn.style.opacity = "0.4";
  goBtn.style.cursor = "not-allowed";

  itemSel.onchange = () => {
    const hasItem = !!itemSel.value;
    goBtn.disabled = !hasItem;
    goBtn.style.opacity = hasItem ? "1" : "0.4";
    goBtn.style.cursor = hasItem ? "pointer" : "not-allowed";
  };
}

function generateWithAnchor() {
  const temp = Number(document.getElementById("inp-temp").value);
  const high = Number(document.getElementById("inp-high").value);
  if (!temp || !high) {
    alert("Go back and enter today's temperature first.");
    return;
  }
  const cat = document.getElementById("anchor-category").value;
  const item = document.getElementById("anchor-item").value;
  if (!item) return;

  // Store anchor so tryAnother can keep it locked
  anchorItem = item;
  anchorCat = cat;
  extraAvoid = [];

  const avoidSet = new Set(worn);
  buildAnchorOutfit(temp, high, item, cat, avoidSet);
  document.getElementById("screen-anchor").classList.remove("active");
  showResult(temp, high);
}

function buildAnchorOutfit(temp, high, item, cat, avoidSet) {
  const isRainy = ["Rainy","Thunderstorms","Chance of rain"].includes(selectedCond);
  const swing = high - temp;
  const bigSwing = swing >= 15;

  let top = null, layer = null, bottom = null;
  let shoes = isRainy ? "Blundstones" : "white sneakers";

  // Always exclude the anchor item from the avoid set so it's never filtered out
  const avoidWithoutAnchor = new Set([...avoidSet].filter(i => i !== item));

  if (cat === "top" || cat === "ss" || cat === "tee") {
    top = item;
    if (high >= 78 && !isRainy) bottom = pick([...W.shorts, ...W.chinos, ...W.pants], avoidWithoutAnchor);
    else if (temp < 65) bottom = pick([...W.jeans, ...W.chinos, ...W.pants], avoidWithoutAnchor);
    else bottom = pick([...W.chinos, ...W.jeans, ...W.pants], avoidWithoutAnchor);
    if (temp < 65 || temp < 55) {
      layer = pickLayer(["casual","weather"], top, bottom, avoidWithoutAnchor);
    } else if (temp < 75 && (selectedCond === "Cloudy" || selectedCond === "Partly cloudy" || selectedCond === "Windy")) {
      layer = pickLayer(["casual","smart"], top, bottom, avoidWithoutAnchor);
    }

  } else if (cat === "layer") {
    layer = item;
    const noShirtJacket = ["gray crewneck sweatshirt","black pullover hoodie"];
    if (CASUAL_LAYERS.includes(item)) {
      top = pick([...W.tees, ...W.ss, ...W.ls.filter(t => !noShirtJacket.includes(t))], avoidWithoutAnchor);
    } else {
      top = pick([...W.tees, ...W.ls], avoidWithoutAnchor);
    }
    if (high >= 78 && !isRainy) bottom = pick([...W.shorts, ...W.chinos, ...W.pants], avoidWithoutAnchor);
    else if (temp < 65) bottom = pick([...W.jeans, ...W.chinos, ...W.pants], avoidWithoutAnchor);
    else bottom = pick([...W.chinos, ...W.jeans, ...W.pants], avoidWithoutAnchor);

  } else if (cat === "bottom") {
    bottom = item;
    const hasShorts = item.includes("shorts");
    if (temp < 55) {
      top = bigSwing ? pick(W.tees, avoidWithoutAnchor, bottom) : pick(W.ls, avoidWithoutAnchor);
      layer = pickLayer(["casual","weather"], top, bottom, avoidWithoutAnchor);
    } else if (temp < 65) {
      top = bigSwing ? pick(W.tees, avoidWithoutAnchor, bottom) : pick(W.ls, avoidWithoutAnchor);
      if (!bigSwing && high < 72) layer = pickLayer(["casual"], top, bottom, avoidWithoutAnchor);
      else if (bigSwing) layer = pickLayer(["casual","weather"], top, bottom, avoidWithoutAnchor);
    } else if (temp < 75 && !hasShorts) {
      top = pick([...W.tees, ...W.ss], avoidWithoutAnchor);
      if (selectedCond === "Cloudy" || selectedCond === "Partly cloudy" || selectedCond === "Windy") {
        layer = pickLayer(["casual","smart"], top, bottom, avoidWithoutAnchor);
      }
    } else {
      top = pick([...W.tees, ...W.ss], avoidWithoutAnchor);
    }
    if (layer === "brown blazer" && (hasShorts || item.includes("jeans"))) {
      layer = pickLayer(["casual"], top, bottom, avoidWithoutAnchor);
    }
  }

  if (isRainy && layer && CASUAL_LAYERS.includes(layer)) {
    layer = pickLayer(["weather"], top, bottom, avoidWithoutAnchor) || layer;
  }

  const vibe = `Built around: ${item}`;
  const why = `Starting with your ${item} — ` +
    (bigSwing ? `big temp swing today (${temp}° → ${high}°) so the rest layers easily.`
               : `the rest complements it for ${temp}°F heading to ${high}°F.`);

  lastOutfit = { top, layer, bottom, shoes, vibe, why };
}

function showInput() {
  document.getElementById("screen-result").style.display = "none";
  document.getElementById("screen-result").classList.remove("active");
  document.getElementById("screen-log").classList.remove("active");
  document.getElementById("screen-anchor").classList.remove("active");
  document.getElementById("screen-input").classList.add("active");
  anchorItem = null;
  anchorCat = null;
  window.scrollTo(0, 0);
}

function showManualLog() {
  // Populate dropdowns
  const allTops = [...W.tees, ...W.ls, ...W.ss];
  const allLayers = W.layers;
  const allBottoms = [...W.chinos, ...W.jeans, ...W.shorts, ...W.pants];

  const topSel = document.getElementById("log-top");
  const layerSel = document.getElementById("log-layer");
  const bottomSel = document.getElementById("log-bottom");

  topSel.innerHTML = '<option value="">— select —</option>' + allTops.map(i => `<option>${i}</option>`).join("");
  layerSel.innerHTML = '<option value="">— none —</option>' + allLayers.map(i => `<option>${i}</option>`).join("");
  bottomSel.innerHTML = '<option value="">— select —</option>' + allBottoms.map(i => `<option>${i}</option>`).join("");

  document.getElementById("screen-input").classList.remove("active");
  document.getElementById("screen-log").classList.add("active");
  window.scrollTo(0, 0);
}

function saveManualLog() {
  const top = document.getElementById("log-top").value;
  const layer = document.getElementById("log-layer").value;
  const bottom = document.getElementById("log-bottom").value;
  const shoes = document.getElementById("log-shoes").value;

  if (!top || !bottom || !shoes) {
    alert("Please select at least a top, bottom, and shoes.");
    return;
  }

  const items = [top, layer, bottom, shoes].filter(Boolean);
  worn = [...new Set([...items, ...worn])].slice(0, 15);
  localStorage.setItem("worn", JSON.stringify(worn));
  renderWorn();

  // Show confirmation then go back
  const btn = document.querySelector("#screen-log .main-btn");
  btn.textContent = "✓ Saved!";
  btn.style.background = "#1a2a1a";
  btn.style.color = "#4a8a4a";
  setTimeout(() => {
    btn.textContent = "Save to History";
    btn.style.background = "";
    btn.style.color = "";
    showInput();
  }, 1200);
}

function clearWorn() {
  worn = [];
  localStorage.removeItem("worn");
  renderWorn();
}

function renderWorn() {
  const sec = document.getElementById("worn-section");
  const tags = document.getElementById("worn-tags");
  const status = document.getElementById("worn-status");

  if (worn.length === 0) {
    sec.style.display = "none";
    if (status) status.innerHTML = "";
  } else {
    sec.style.display = "block";
    tags.innerHTML = worn.map(w => `<span class="tag">${w}</span>`).join("");
    if (status) status.innerHTML = `${worn.length} items in worn history — <button onclick="clearWorn()" style="background:none;border:none;color:#666;font-size:11px;cursor:pointer;font-family:'Georgia',serif;text-decoration:underline">clear</button>`;
  }
}

renderWorn();
</script>
